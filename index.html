<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bones Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
        }

        h1 {
            color: #222;
        }

        .container {
            padding: 20px;
        }

        .bone-card {
            background-color: white;
            width: 250px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        img {
            width: 200px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Types of Bones</a>
        <a href="#">Functions</a>
        <a href="#">Fun Facts</a>
    </nav>

    <div class="container">

        <h1>The Human Skeleton</h1>

        <p>Bones help support and protect the human body.</p>

        <!-- Bone Example 1 -->
        <div class="bone-card">
            <h2>Skull</h2>

            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Human_skull_front_simplified.png" alt="Skull">

            <p>The skull protects the brain.</p>
        </div>

        <!-- Bone Example 2 -->
        <div class="bone-card">
            <h2>Femur</h2>

            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Femur_front.png" alt="Femur Bone">

            <p>The femur is the longest bone in the body.</p>
        </div>

    </div>

</body>
</html>
